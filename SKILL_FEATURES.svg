<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f4f8;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- 背景渐变 -->
  <rect width="800" height="600" fill="url(#bgGradient)"/>
  
  <!-- 标题 -->
  <text x="400" y="60" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="white" text-anchor="middle">
    Trae Multi-Agent Skill
  </text>
  <text x="400" y="90" font-family="Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.9)" text-anchor="middle">
    智能多角色协作 · 完整项目生命周期管理
  </text>
  
  <!-- 角色卡片区域 -->
  <g transform="translate(50, 130)">
    <!-- 角色 1: 架构师 -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="140" height="180" rx="12" fill="url(#cardGradient)" filter="url(#shadow)"/>
      <circle cx="70" cy="40" r="35" fill="#667eea"/>
      <text x="70" y="50" font-family="Arial, sans-serif" font-size="24" fill="white" text-anchor="middle"> architect </text>
      <text x="70" y="100" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#333" text-anchor="middle">架构师</text>
      <text x="70" y="125" font-family="Arial, sans-serif" font-size="12" fill="#666" text-anchor="middle">系统架构</text>
      <text x="70" y="145" font-family="Arial, sans-serif" font-size="12" fill="#666" text-anchor="middle">技术选型</text>
      <text x="70" y="165" font-family="Arial, sans-serif" font-size="12" fill="#666" text-anchor="middle">性能优化</text>
    </g>
    
    <!-- 箭头 -->
    <path d="M160 90 L200 90" stroke="white" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- 角色 2: 产品经理 -->
    <g transform="translate(210, 0)">
      <rect x="0" y="0" width="140" height="180" rx="12" fill="url(#cardGradient)" filter="url(#shadow)"/>
      <circle cx="70" cy="40" r="35" fill="#764ba2"/>
      <text x="70" y="50" font-family="Arial, sans-serif" font-size="24" fill="white" text-anchor="middle"> product </text>
      <text x="70" y="75" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#333" text-anchor="middle">产品经理</text>
      <text x="70" y="100" font-family="Arial, sans-serif" font-size="12" fill="#666" text-anchor="middle">需求分析</text>
      <text x="70" y="120" font-family="Arial, sans-serif" font-size="12" fill="#666" text-anchor="middle">PRD 编写</text>
      <text x="70" y="140" font-family="Arial, sans-serif" font-size="12" fill="#666" text-anchor="middle">验收标准</text>
    </g>
    
    <!-- 箭头 -->
    <path d="M370 90 L410 90" stroke="white" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- 角色 3: UI 设计师 -->
    <g transform="translate(420, 0)">
      <rect x="0" y="0" width="140" height="180" rx="12" fill="url(#cardGradient)" filter="url(#shadow)"/>
      <circle cx="70" cy="40" r="35" fill="#f093fb"/>
      <text x="70" y="50" font-family="Arial, sans-serif" font-size="24" fill="white" text-anchor="middle"> UI </text>
      <text x="70" y="80" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#333" text-anchor="middle">UI 设计师</text>
      <text x="70" y="105" font-family="Arial, sans-serif" font-size="12" fill="#666" text-anchor="middle">界面设计</text>
      <text x="70" y="125" font-family="Arial, sans-serif" font-size="12" fill="#666" text-anchor="middle">视觉优化</text>
      <text x="70" y="145" font-family="Arial, sans-serif" font-size="12" fill="#666" text-anchor="middle">设计系统</text>
    </g>
    
    <!-- 箭头 -->
    <path d="M580 90 L620 90" stroke="white" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- 角色 4: 测试专家 -->
    <g transform="translate(630, 0)">
      <rect x="0" y="0" width="140" height="180" rx="12" fill="url(#cardGradient)" filter="url(#shadow)"/>
      <circle cx="70" cy="40" r="35" fill="#43e97b"/>
      <text x="70" y="50" font-family="Arial, sans-serif" font-size="24" fill="white" text-anchor="middle"> test </text>
      <text x="70" y="80" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#333" text-anchor="middle">测试专家</text>
      <text x="70" y="105" font-family="Arial, sans-serif" font-size="12" fill="#666" text-anchor="middle">测试策略</text>
      <text x="70" y="125" font-family="Arial, sans-serif" font-size="12" fill="#666" text-anchor="middle">质量保障</text>
      <text x="70" y="145" font-family="Arial, sans-serif" font-size="12" fill="#666" text-anchor="middle">自动化测试</text>
    </g>
  </g>
  
  <!-- 开发者角色（下方） -->
  <g transform="translate(330, 320)">
    <rect x="0" y="0" width="140" height="180" rx="12" fill="url(#cardGradient)" filter="url(#shadow)"/>
    <circle cx="70" cy="40" r="35" fill="#fa709a"/>
    <text x="70" y="50" font-family="Arial, sans-serif" font-size="24" fill="white" text-anchor="middle"> solo </text>
    <text x="70" y="80" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#333" text-anchor="middle">独立开发者</text>
    <text x="70" y="105" font-family="Arial, sans-serif" font-size="12" fill="#666" text-anchor="middle">功能实现</text>
    <text x="70" y="125" font-family="Arial, sans-serif" font-size="12" fill="#666" text-anchor="middle">单元测试</text>
    <text x="70" y="145" font-family="Arial, sans-serif" font-size="12" fill="#666" text-anchor="middle">代码优化</text>
  </g>
  
  <!-- 八阶段工作流程 -->
  <g transform="translate(50, 480)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">八阶段标准工作流程：</text>
    
    <!-- 阶段 1 -->
    <g transform="translate(0, 30)">
      <circle cx="15" cy="15" r="12" fill="rgba(255,255,255,0.2)"/>
      <text x="35" y="20" font-family="Arial, sans-serif" font-size="14" fill="white">1. 需求分析</text>
      <text x="150" y="20" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.8)">产品经理</text>
    </g>
    
    <!-- 阶段 2 -->
    <g transform="translate(0, 60)">
      <circle cx="15" cy="15" r="12" fill="rgba(255,255,255,0.2)"/>
      <text x="35" y="20" font-family="Arial, sans-serif" font-size="14" fill="white">2. 架构设计</text>
      <text x="150" y="20" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.8)">架构师</text>
    </g>
    
    <!-- 阶段 3 -->
    <g transform="translate(0, 90)">
      <circle cx="15" cy="15" r="12" fill="rgba(255,255,255,0.2)"/>
      <text x="35" y="20" font-family="Arial, sans-serif" font-size="14" fill="white">3. UI 设计</text>
      <text x="150" y="20" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.8)">UI 设计师</text>
    </g>
    
    <!-- 阶段 4 -->
    <g transform="translate(0, 120)">
      <circle cx="15" cy="15" r="12" fill="rgba(255,255,255,0.2)"/>
      <text x="35" y="20" font-family="Arial, sans-serif" font-size="14" fill="white">4. 测试设计</text>
      <text x="150" y="20" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.8)">测试专家</text>
    </g>
    
    <!-- 阶段 5 -->
    <g transform="translate(0, 150)">
      <circle cx="15" cy="15" r="12" fill="rgba(255,255,255,0.2)"/>
      <text x="35" y="20" font-family="Arial, sans-serif" font-size="14" fill="white">5. 任务分解</text>
      <text x="150" y="20" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.8)">独立开发者</text>
    </g>
    
    <!-- 阶段 6 -->
    <g transform="translate(0, 180)">
      <circle cx="15" cy="15" r="12" fill="rgba(255,255,255,0.2)"/>
      <text x="35" y="20" font-family="Arial, sans-serif" font-size="14" fill="white">6. 开发实现</text>
      <text x="150" y="20" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.8)">独立开发者</text>
    </g>
    
    <!-- 阶段 7 -->
    <g transform="translate(0, 210)">
      <circle cx="15" cy="15" r="12" fill="rgba(255,255,255,0.2)"/>
      <text x="35" y="20" font-family="Arial, sans-serif" font-size="14" fill="white">7. 测试验证</text>
      <text x="150" y="20" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.8)">测试专家</text>
    </g>
    
    <!-- 阶段 8 -->
    <g transform="translate(0, 240)">
      <circle cx="15" cy="15" r="12" fill="rgba(255,255,255,0.2)"/>
      <text x="35" y="20" font-family="Arial, sans-serif" font-size="14" fill="white">8. 发布评审</text>
      <text x="150" y="20" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.8)">多角色共识</text>
    </g>
  </g>
  
  <!-- 核心特性 -->
  <g transform="translate(500, 480)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">核心特性：</text>
    
    <g transform="translate(0, 30)">
      <circle cx="10" cy="10" r="8" fill="#43e97b"/>
      <text x="25" y="14" font-family="Arial, sans-serif" font-size="14" fill="white">智能角色调度</text>
    </g>
    
    <g transform="translate(0, 60)">
      <circle cx="10" cy="10" r="8" fill="#43e97b"/>
      <text x="25" y="14" font-family="Arial, sans-serif" font-size="14" fill="white">规范驱动开发</text>
    </g>
    
    <g transform="translate(0, 90)">
      <circle cx="10" cy="10" r="8" fill="#43e97b"/>
      <text x="25" y="14" font-family="Arial, sans-serif" font-size="14" fill="white">代码地图生成</text>
    </g>
    
    <g transform="translate(0, 120)">
      <circle cx="10" cy="10" r="8" fill="#43e97b"/>
      <text x="25" y="14" font-family="Arial, sans-serif" font-size="14" fill="white">项目理解</text>
    </g>
    
    <g transform="translate(0, 150)">
      <circle cx="10" cy="10" r="8" fill="#43e97b"/>
      <text x="25" y="14" font-family="Arial, sans-serif" font-size="14" fill="white">多角色协同</text>
    </g>
    
    <g transform="translate(0, 180)">
      <circle cx="10" cy="10" r="8" fill="#43e97b"/>
      <text x="25" y="14" font-family="Arial, sans-serif" font-size="14" fill="white">共识机制</text>
    </g>
    
    <g transform="translate(0, 210)">
      <circle cx="10" cy="10" r="8" fill="#43e97b"/>
      <text x="25" y="14" font-family="Arial, sans-serif" font-size="14" fill="white">中英文双语</text>
    </g>
  </g>
  
  <!-- 箭头标记 -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="white"/>
    </marker>
  </defs>
  
  <!-- 底部装饰 -->
  <rect x="0" y="580" width="800" height="20" fill="rgba(255,255,255,0.1)"/>
  <text x="400" y="595" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.6)" text-anchor="middle">
    https://github.com/weiransoft/TraeMultiAgentSkill
  </text>
</svg>