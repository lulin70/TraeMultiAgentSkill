name: trae-multi-agent
version: 3.0.0
description: |
  V3.0 多智能体协作平台 — 基于 Coordinator/Worker/Scratchpad 模式的完整多Agent协作系统。

  核心架构：用户任务 → MultiAgentDispatcher → Coordinator编排 → 多Worker并行执行 → Scratchpad共享 → Consensus决策 → 结果返回

  10大核心模块（668测试全通过）：
  1. Coordinator 协调器 - 全局任务编排与Worker管理
  2. Scratchpad 共享黑板 - Worker间实时信息交换
  3. Worker 执行者 - 角色实例化与任务执行
  4. ConsensusEngine 共识引擎 - 权重投票+否决权+升级人工
  5. BatchScheduler 并行调度 - 自动并发安全性判断
  6. ContextCompressor 上下文压缩 - 3级压缩防溢出(SNIP/SessionMemory/FullCompact)
  7. PermissionGuard 权限守卫 - 4级安全分级(PLAN/DEFAULT/AUTO/BYPASS)
  8. Skillifier 技能学习 - 从成功操作自动生成新Skill
  9. WarmupManager 启动预热 - 3层预加载(EAGER/ASYNC/LAZY) + 进程级缓存
  10. MemoryBridge 记忆桥接 - 7类型记忆 + 倒排索引 + TF-IDF + 遗忘曲线

author: Trae Team
status: active
ai_enhanced: true
ai_capabilities:
  semantic_matching: true
  intelligent_reasoning: true
  context_understanding: true
  natural_language_interface: true
  long_running_agent: true
  multi_agent_collaboration: true
  memory_persistence: true
  auto_skill_generation: true

capabilities:
  - name: multi-agent-dispatcher
    description: |
      V3.0 统一调度入口 - 一键完成多Agent协作

      核心能力：
      - 任务意图分析与角色自动匹配
      - Coordinator全局编排多Worker并行执行
      - Scratchpad实时共享发现/决策/冲突
      - Consensus共识决策解决分歧
      - 完整结果报告(Markdown格式)
    input_schema:
      type: object
      properties:
        task:
          type: string
          description: 任务描述
        roles:
          type: array
          items:
            type: string
          description: 指定参与角色(可选，默认自动匹配)
        mode:
          type: string
          enum: [auto, parallel, sequential, consensus]
          description: 调度模式
        dry_run:
          type: boolean
          description: 仅模拟不执行
    output_schema:
      type: object
      properties:
        success:
          type: boolean
        matched_roles:
          type: array
          items:
            type: string
        summary:
          type: string
        report:
          type: string
          description: Markdown格式完整报告
        timing:
          type: object
        worker_results:
          type: array

  - name: coordinator-collaboration
    description: |
      Coordinator + Worker + Scratchpad 协作核心

      使用场景：
      - 需要多个角色同时分析同一问题
      - 复杂任务需要分工协作
      - 需要实时共享中间发现和决策

  - name: context-compression
    description: |
      3级上下文压缩策略

      Level 1 SNIP: 精细剪裁旧对话
      Level 2 SessionMemory: 提取记忆后清空
      Level 3 FullCompact: LLM生成摘要

  - name: permission-guard
    description: |
      4级权限安全守卫

      PLAN: 只读模式
      DEFAULT: 写操作需确认
      AUTO: AI分类器自动判断
      BYPASS: 完全跳过(最高信任)

  - name: skill-learning
    description: |
      Skillifier - 从成功操作序列中自动生成可复用Skill

  - name: warmup-optimizer
    description: |
      WarmupManager - 3层启动预热优化冷启动延迟

      EAGER: 同步预加载(~15ms)
      ASYNC: 异步后台预热(~300ms)
      LAZY: 按需加载

  - name: memory-bridge
    description: |
      MemoryBridge - 跨会话记忆桥接系统

      7种记忆类型: knowledge/episodic/semantic/feedback/pattern/analysis/correction
      倒排索引 + TF-IDF检索 + 中文分词
      遗忘曲线: 7d=1.0 → 90d≈0.3
      自动压缩(60d+) + 过期清理(90d+)

dependencies: []

ai_integration:
  enabled: true
  provider: trae_ai_assistant
  features:
    - semantic_matching
    - intelligent_reasoning
    - context_understanding
    - natural_language_processing
    - code_analysis
    - multi_agent_orchestration
  config:
    max_tokens: 8192
    temperature: 0.7
    top_p: 0.9
    use_cache: true
    fallback_to_keyword: true

workflows:
  - workflow_id: v3-multi-agent-collaboration
    name: V3 多Agent协作工作流
    description: 基于Coordinator/Worker/Scratchpad的并行协作流程
    steps:
      - step_id: analyze
        name: 任务分析
        action: dispatcher.analyze_task()
      - step_id: plan
        name: 编排计划
        action: coordinator.plan_task()
      - step_id: spawn
        name: 创建Worker
        action: coordinator.spawn_workers()
      - step_id: execute
        name: 并行执行
        action: coordinator.execute_plan()
      - step_id: collect
        name: 收集结果
        action: coordinator.collect_results()
      - step_id: consensus
        name: 共识决策(如有冲突)
        action: coordinator.resolve_conflicts()
      - step_id: report
        name: 生成报告
        action: result.to_markdown()

