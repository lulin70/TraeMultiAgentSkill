<svg width="1200" height="750" viewBox="0 0 1200 750" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f4f8;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- 背景渐变 -->
  <rect width="1200" height="750" fill="url(#bgGradient)"/>
  
  <!-- 标题 -->
  <text x="600" y="50" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="white" text-anchor="middle">
    Trae Multi-Agent Skill
  </text>
  <text x="600" y="85" font-family="Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.9)" text-anchor="middle">
    智能多角色协作 · 完整项目生命周期管理
  </text>
  
  <!-- 角色区域 (上半部分 - 一排 5 个) -->
  <g transform="translate(50, 130)">
    <!-- 角色 1: 架构师 -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="200" height="130" rx="12" fill="url(#cardGradient)" filter="url(#shadow)"/>
      <rect x="60" y="15" width="80" height="50" rx="6" fill="#667eea"/>
      <text x="100" y="48" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle" font-weight="bold">Architect</text>
      <text x="100" y="85" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#333" text-anchor="middle">架构师</text>
      <text x="100" y="105" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">系统架构设计 · 技术选型</text>
      <text x="100" y="120" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">性能优化</text>
    </g>
    
    <!-- 箭头 1 -->
    <path d="M210 65 L230 65" stroke="white" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- 角色 2: 产品经理 -->
    <g transform="translate(240, 0)">
      <rect x="0" y="0" width="200" height="130" rx="12" fill="url(#cardGradient)" filter="url(#shadow)"/>
      <rect x="60" y="15" width="80" height="50" rx="6" fill="#764ba2"/>
      <text x="100" y="48" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle" font-weight="bold">Product</text>
      <text x="100" y="85" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#333" text-anchor="middle">产品经理</text>
      <text x="100" y="105" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">需求分析 · PRD 编写</text>
      <text x="100" y="120" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">定义验收标准</text>
    </g>
    
    <!-- 箭头 2 -->
    <path d="M450 65 L470 65" stroke="white" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- 角色 3: UI 设计师 -->
    <g transform="translate(480, 0)">
      <rect x="0" y="0" width="200" height="130" rx="12" fill="url(#cardGradient)" filter="url(#shadow)"/>
      <rect x="60" y="15" width="80" height="50" rx="6" fill="#f093fb"/>
      <text x="100" y="48" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle" font-weight="bold">UI</text>
      <text x="100" y="85" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#333" text-anchor="middle">UI 设计师</text>
      <text x="100" y="105" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">界面设计 · 视觉优化</text>
      <text x="100" y="120" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">设计系统制定</text>
    </g>
    
    <!-- 箭头 3 -->
    <path d="M690 65 L710 65" stroke="white" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- 角色 4: 测试专家 -->
    <g transform="translate(720, 0)">
      <rect x="0" y="0" width="200" height="130" rx="12" fill="url(#cardGradient)" filter="url(#shadow)"/>
      <rect x="60" y="15" width="80" height="50" rx="6" fill="#43e97b"/>
      <text x="100" y="48" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle" font-weight="bold">Test</text>
      <text x="100" y="85" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#333" text-anchor="middle">测试专家</text>
      <text x="100" y="105" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">测试策略 · 质量保障</text>
      <text x="100" y="120" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">自动化测试</text>
    </g>
    
    <!-- 箭头 4 -->
    <path d="M930 65 L950 65" stroke="white" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- 角色 5: 独立开发者 -->
    <g transform="translate(960, 0)">
      <rect x="0" y="0" width="200" height="130" rx="12" fill="url(#cardGradient)" filter="url(#shadow)"/>
      <rect x="60" y="15" width="80" height="50" rx="6" fill="#fa709a"/>
      <text x="100" y="48" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle" font-weight="bold">Solo</text>
      <text x="100" y="85" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#333" text-anchor="middle">独立开发者</text>
      <text x="100" y="105" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">功能实现 · 单元测试</text>
      <text x="100" y="120" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">代码优化</text>
    </g>
  </g>
  
  <!-- 八阶段工作流程 (左下) -->
  <g transform="translate(50, 320)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white">八阶段标准工作流程：</text>
    
    <!-- 阶段 1 -->
    <g transform="translate(0, 40)">
      <circle cx="15" cy="15" r="12" fill="rgba(255,255,255,0.25)"/>
      <text x="15" y="20" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">1</text>
      <text x="45" y="20" font-family="Arial, sans-serif" font-size="15" fill="white">需求分析</text>
      <text x="160" y="20" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.85)">产品经理</text>
    </g>
    
    <!-- 阶段 2 -->
    <g transform="translate(0, 75)">
      <circle cx="15" cy="15" r="12" fill="rgba(255,255,255,0.25)"/>
      <text x="15" y="20" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">2</text>
      <text x="45" y="20" font-family="Arial, sans-serif" font-size="15" fill="white">架构设计</text>
      <text x="160" y="20" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.85)">架构师</text>
    </g>
    
    <!-- 阶段 3 -->
    <g transform="translate(0, 110)">
      <circle cx="15" cy="15" r="12" fill="rgba(255,255,255,0.25)"/>
      <text x="15" y="20" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">3</text>
      <text x="45" y="20" font-family="Arial, sans-serif" font-size="15" fill="white">UI 设计</text>
      <text x="160" y="20" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.85)">UI 设计师</text>
    </g>
    
    <!-- 阶段 4 -->
    <g transform="translate(0, 145)">
      <circle cx="15" cy="15" r="12" fill="rgba(255,255,255,0.25)"/>
      <text x="15" y="20" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">4</text>
      <text x="45" y="20" font-family="Arial, sans-serif" font-size="15" fill="white">测试设计</text>
      <text x="160" y="20" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.85)">测试专家</text>
    </g>
    
    <!-- 阶段 5 -->
    <g transform="translate(0, 180)">
      <circle cx="15" cy="15" r="12" fill="rgba(255,255,255,0.25)"/>
      <text x="15" y="20" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">5</text>
      <text x="45" y="20" font-family="Arial, sans-serif" font-size="15" fill="white">任务分解</text>
      <text x="160" y="20" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.85)">独立开发者</text>
    </g>
    
    <!-- 阶段 6 -->
    <g transform="translate(0, 215)">
      <circle cx="15" cy="15" r="12" fill="rgba(255,255,255,0.25)"/>
      <text x="15" y="20" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">6</text>
      <text x="45" y="20" font-family="Arial, sans-serif" font-size="15" fill="white">开发实现</text>
      <text x="160" y="20" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.85)">独立开发者</text>
    </g>
    
    <!-- 阶段 7 -->
    <g transform="translate(0, 250)">
      <circle cx="15" cy="15" r="12" fill="rgba(255,255,255,0.25)"/>
      <text x="15" y="20" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">7</text>
      <text x="45" y="20" font-family="Arial, sans-serif" font-size="15" fill="white">测试验证</text>
      <text x="160" y="20" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.85)">测试专家</text>
    </g>
    
    <!-- 阶段 8 -->
    <g transform="translate(0, 285)">
      <circle cx="15" cy="15" r="12" fill="rgba(255,255,255,0.25)"/>
      <text x="15" y="20" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">8</text>
      <text x="45" y="20" font-family="Arial, sans-serif" font-size="15" fill="white">发布评审</text>
      <text x="160" y="20" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.85)">多角色共识</text>
    </g>
  </g>
  
  <!-- 核心特性 (右下) -->
  <g transform="translate(600, 320)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white">核心特性：</text>
    
    <g transform="translate(0, 40)">
      <circle cx="12" cy="12" r="10" fill="#43e97b"/>
      <text x="32" y="17" font-family="Arial, sans-serif" font-size="15" fill="white">智能角色调度</text>
      <text x="32" y="35" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.75)">基于关键词匹配和位置权重算法</text>
    </g>
    
    <g transform="translate(0, 80)">
      <circle cx="12" cy="12" r="10" fill="#43e97b"/>
      <text x="32" y="17" font-family="Arial, sans-serif" font-size="15" fill="white">规范驱动开发</text>
      <text x="32" y="35" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.75)">遵循架构规范与最佳实践</text>
    </g>
    
    <g transform="translate(0, 120)">
      <circle cx="12" cy="12" r="10" fill="#43e97b"/>
      <text x="32" y="17" font-family="Arial, sans-serif" font-size="15" fill="white">代码地图生成</text>
      <text x="32" y="35" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.75)">自动生成项目结构与代码文档</text>
    </g>
    
    <g transform="translate(0, 160)">
      <circle cx="12" cy="12" r="10" fill="#43e97b"/>
      <text x="32" y="17" font-family="Arial, sans-serif" font-size="15" fill="white">项目理解</text>
      <text x="32" y="35" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.75)">深度理解项目上下文与依赖关系</text>
    </g>
    
    <g transform="translate(0, 200)">
      <circle cx="12" cy="12" r="10" fill="#43e97b"/>
      <text x="32" y="17" font-family="Arial, sans-serif" font-size="15" fill="white">多角色协同</text>
      <text x="32" y="35" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.75)">5 个专业角色协同工作</text>
    </g>
    
    <g transform="translate(0, 240)">
      <circle cx="12" cy="12" r="10" fill="#43e97b"/>
      <text x="32" y="17" font-family="Arial, sans-serif" font-size="15" fill="white">共识机制</text>
      <text x="32" y="35" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.75)">多角色共识评审确保质量</text>
    </g>
    
    <g transform="translate(0, 280)">
      <circle cx="12" cy="12" r="10" fill="#43e97b"/>
      <text x="32" y="17" font-family="Arial, sans-serif" font-size="15" fill="white">中英文双语</text>
      <text x="32" y="35" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.75)">支持中英文双语交互</text>
    </g>
    
    <g transform="translate(0, 320)">
      <circle cx="12" cy="12" r="10" fill="#43e97b"/>
      <text x="32" y="17" font-family="Arial, sans-serif" font-size="15" fill="white">避免 AI slop</text>
      <text x="32" y="35" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.75)">生产级高质量输出</text>
    </g>
  </g>
  
  <!-- 箭头标记 -->
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="white"/>
    </marker>
  </defs>
  
  <!-- 底部装饰 -->
  <rect x="0" y="725" width="1200" height="25" fill="rgba(255,255,255,0.1)"/>
  <text x="600" y="743" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.8)" text-anchor="middle">
    https://github.com/weiransoft/TraeMultiAgentSkill
  </text>
</svg>