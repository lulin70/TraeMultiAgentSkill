name: DevSquad CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-cov
          pip install -e ".[dev]" || true

      - name: Run core tests
        run: |
          python -m pytest scripts/collaboration/core_test.py scripts/collaboration/role_mapping_test.py scripts/collaboration/upstream_test.py -v --tb=short

      - name: Run CLI smoke test
        run: |
          python scripts/cli.py --version
          python scripts/cli.py status

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 mypy

      - name: Lint with flake8
        run: |
          flake8 scripts/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 scripts/ --count --exit-zero --max-complexity=15 --max-line-length=120 --statistics

      - name: Type check with mypy
        run: |
          mypy scripts/collaboration/models.py scripts/collaboration/_version.py --ignore-missing-imports || true
